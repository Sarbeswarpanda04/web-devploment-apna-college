<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini VS Code Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#1e1e1e;
    color:white;
}

.container{
    display:flex;
    height:100vh;
}

/* Activity Bar */
.activity-bar{
    width:50px;
    background:#181818;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:15px;
    gap:20px;
}

.icon{
    font-size:22px;
    cursor:pointer;
    opacity:.7;
}

.icon:hover{
    opacity:1;
}

/* Sidebar */
.sidebar{
    width:240px;
    background:#252526;
    border-right:1px solid #333;
}

.sidebar-header{
    padding:12px;
    font-size:12px;
    text-transform:uppercase;
    color:#bbb;
}

.file{
    padding:10px 15px;
    cursor:pointer;
    color:#ddd;
}

.file:hover{
    background:#2f2f2f;
}

/* Main Area */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* Tabs */
.tabs{
    display:flex;
    background:#2d2d2d;
    border-bottom:1px solid #333;
}

.tab{
    padding:10px 18px;
    cursor:pointer;
    border-right:1px solid #444;
    color:#ccc;
}

.tab.active{
    background:#1e1e1e;
    color:white;
}

/* Editor */
.editor-container{
    flex:1;
}

textarea{
    width:100%;
    height:100%;
    background:#1e1e1e;
    color:#d4d4d4;
    border:none;
    outline:none;
    resize:none;
    padding:20px;
    font-size:15px;
    line-height:1.5;
    font-family: Consolas, monospace;
}

/* Status Bar */
.statusbar{
    height:25px;
    background:#007acc;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 12px;
    font-size:12px;
}
</style>
</head>
<body>

<div class="container">

    <div class="activity-bar">
        <div class="icon">📁</div>
        <div class="icon">🔍</div>
        <div class="icon">🌿</div>
        <div class="icon">▶</div>
        <div class="icon">⚙</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">Explorer</div>

        <div class="file" onclick="openFile('html')">
            index.html
        </div>

        <div class="file" onclick="openFile('css')">
            style.css
        </div>

        <div class="file" onclick="openFile('js')">
            script.js
        </div>
    </div>

    <div class="main">

        <div class="tabs">
            <div class="tab active" id="tab">
                index.html
            </div>
        </div>

        <div class="editor-container">
            <textarea id="editor"></textarea>
        </div>

        <div class="statusbar">
            <span>⚡ Mini VS Code Clone</span>
            <span>UTF-8 | JavaScript</span>
        </div>

    </div>

</div>

<script>

const files = {

html: `<!DOCTYPE html>
<html>
<head>
<title>My Page</title>
</head>
<body>
<h1>Hello VS Code Clone</h1>
</body>
</html>`,

css: `body{
    background:#111;
    color:white;
}`,

js: `console.log("Hello World");`
};

const editor = document.getElementById("editor");
const tab = document.getElementById("tab");

function openFile(type){

    editor.value = files[type];

    if(type==="html"){
        tab.innerText = "index.html";
    }

    if(type==="css"){
        tab.innerText = "style.css";
    }

    if(type==="js"){
        tab.innerText = "script.js";
    }
}

openFile("html");

</script>

</body>
</html>
