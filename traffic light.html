<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trafiic Light</title>
</head>
<style>
    #traffic-light {
        height: 200px;
        width: 70px;
        border: 2px solid black; 
    }
    #traffic-light div {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid black;
        margin: 10px;
    }
    #red {
        background-color: red;
    }
    #yellow {
        background-color: yellow;
    }
    #green {
        background-color: green;
    }
</style>

<body>
    <h2>Trafiic Light</h2>
    <div id="traffic-light">
        <div id="red"></div>
        <div id="yellow"></div>
        <div id="green"></div>
    </div>
</body>

</html>
