<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variable</title>
</head>
<body>
  <script>
    let welcomwMessage = 'Hello Friends';
    console.log(welcomwMessage);

    let a = 2;
    let b = 5;
    let sum = a + b;
    let sub = a - b;
    let mul = a * b;
    let div = a / b;
    console.log('a = ',a);
    console.log('b = ',b);
    console.log('sum = ',sum);
    console.log('sub = ',sub);
    console.log('mul = ',mul);
    console.log('div = ',div);


    console.log('After Operation with 10 with the result');
    sum += 10;
    console.log('sum = ',sum);
    sub -= 10;
    console.log('sub = ',sub);
    mul *= 10;
    console.log('mul = ',mul);
    div /= 10;
    console.log('div = ',div);
  </script>
</body>
</html>
