<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Calculator</title>

  <style>
    body {
  height: 100vh;
  font-family: Arial, sans-serif;
  background: #fcf0ff;
  background: linear-gradient(
    208deg,
    rgba(252, 240, 255, 1) 0%,
    rgba(94, 94, 255, 1) 100%
  );
  margin: 0;
  padding: 0;
}
.cal-container {
  max-width: 400px;
  margin: 50px auto;
  padding: 20px;
  background-color: #fff;
  border: 1px solid #000000;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}
#display {
  width: 85%;
  padding: 20px;
  font-size: 40px;
  text-align: right;
  background-color: #000351f0;
  color: #ffffff;
  border-radius: 4px;
  border: 1px solid #ccc;
  border-radius: 4px;
  margin-bottom: 10px;
}
.button-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.button {
  width: 80px;
  padding: 15px;
  margin: 5px 0;
  font-size: 24px;
  border: 1px solid #110261;
  border-radius: 40px;
  cursor: pointer;
  background: #f7f6df;
  background: linear-gradient(
    340deg,
    rgba(247, 246, 223, 1) 51%,
    rgba(205, 239, 250, 1) 100%
  );
}
.button:hover {
  background-color: #007bff;
  color: #00065c;
}

  </style>
</head>

<body>
  <main class="calculator">
    <div class="cal-container">
      <input type="text" id="display" readonly placeholder="Welcome        "/>
      <div class="button-container">
        <button class="button" onclick="
              currentDisplay = '';
              document.getElementById('display').value = currentDisplay;
            ">
          C
        </button>

        <button class="button" onclick="
              currentDisplay = String(-Number(currentDisplay));
              document.getElementById('display').value = currentDisplay;
            ">
          +/-
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '%';
              document.getElementById('display').value = currentDisplay;
            ">
          %
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '/';
              document.getElementById('display').value = currentDisplay;
            ">
          /
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '7';
              document.getElementById('display').value = currentDisplay;
            ">
          7
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '8';
              document.getElementById('display').value = currentDisplay;
            ">
          8
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '9';
              document.getElementById('display').value = currentDisplay;
            ">
          9
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '*';
              document.getElementById('display').value = currentDisplay;
            ">
          *
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '4';
              document.getElementById('display').value = currentDisplay;
            ">
          4
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '5';
              document.getElementById('display').value = currentDisplay;
            ">
          5
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '6';
              document.getElementById('display').value = currentDisplay;
            ">
          6
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '-';
              document.getElementById('display').value = currentDisplay;
            ">
          -
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '1';
              document.getElementById('display').value = currentDisplay;
            ">
          1
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '2';
              document.getElementById('display').value = currentDisplay;
            ">
          2
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '3';
              document.getElementById('display').value = currentDisplay;
            ">
          3
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '+';
              document.getElementById('display').value = currentDisplay;
            ">
          +
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '0';
              document.getElementById('display').value = currentDisplay;
            ">
          0
        </button>

        <button class="button" onclick="
              currentDisplay = currentDisplay + '.';
              document.getElementById('display').value = currentDisplay;
            ">
          .
        </button>

        <button class="button" onclick="
              try {
                currentDisplay = eval(currentDisplay);
                document.getElementById('display').value = currentDisplay;
              } catch {
                document.getElementById('display').value = 'Error';
              }
            ">
          =
        </button>

        <button class="button" onclick="
currentDisplay = currentDisplay.slice(0, -1);
document.getElementById('display').value = currentDisplay;
">⌫</button>
      </div>
    </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    let currentDisplay = '';
document.querySelector('#display').value = currentDisplay;

  </script>
</body>

</html>
