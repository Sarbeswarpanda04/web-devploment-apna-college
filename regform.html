<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #f6d365, #fda085);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        form{
            background:#fff;
            width:100%;
            max-width:450px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(34, 2, 131, 0.15);
        }

        h2{
            text-align: center;
            margin-bottom:25px;
            color:#29086c;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#444444;
        }

        input[type="text"]{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:18px;
            font-size:15px;
            transition:0.3s;
        }

        input[type="text"]:focus{
            outline:none;
            border-color:#ff7b54;
            box-shadow:0 0 8px rgba(255,123,84,0.3);
        }

        .gender-group{
            margin-bottom:18px;
        }

        .gender-options{
            display:flex;
            gap:20px;
            margin-top:8px;
        }

        .terms{
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:20px;
        }

        .terms label{
            margin:0;
            font-weight:normal;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#ff7b54;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#ff5c33;
            transform:translateY(-2px);
        }

        button:active{
            transform:translateY(0);
        }
    </style>
</head>

<body>

    <form action="/action">
        <h2>Registration Form</h2>

        <label for="firstname">First Name <span style="color: red;">*</span></label>
        <input type="text" id="firstname" name="firstname"
            placeholder="Enter your first name" required>

        <label for="lastname">Last Name <span style="color: red;">*</span></label>
        <input type="text" id="lastname" name="lastname"
            placeholder="Enter your last name" required>

        <div class="gender-group">
            <label>Gender <span style="color: red;">*</span></label>

            <div class="gender-options">
                <div>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male" style="display:inline;">👨 Male</label>
                </div>

                <div>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female" style="display:inline;">👩 Female</label>
                </div>
            </div>
        </div>

        <div class="terms">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to all terms of service</label>
        </div>

        <button type="submit">Register</button>
    </form>
     
    
</body>
</html>
