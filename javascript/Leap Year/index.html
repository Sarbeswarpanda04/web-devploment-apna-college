<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leap Year</title>
</head>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#dbeafe,#f8fafc);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    color:#2563eb;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:2px solid #3b82f6;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#1d4ed8;
    box-shadow:0 0 8px rgba(37,99,235,.3);
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#2563eb;
    color:white;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

#result{
    margin-top:25px;
    padding:15px;
    border-radius:10px;
    background:#eff6ff;
    color:#111827;
    font-size:24px;
    font-weight:bold;
}
</style>
<body>
  <div class="container">

    <h2>Leap Year Or Not</h2>

    <input
        type="number"
        id="year"
        placeholder="Enter a Year">

    <button onclick="leapYear()">
    Check
</button>

    <h3 id="result"></h3>

</div>

<script>
  function leapYear() {

    let year = Number(document.getElementById("year").value);

    if (year % 4 == 0 && year % 100 != 0 || year % 400 == 0) {
        document.getElementById("result").textContent = "✅ Leap Year";
    }
    else {
        document.getElementById("result").textContent = "❌ Not a Leap Year ";
    }
}
</script>
</body>
</html>
