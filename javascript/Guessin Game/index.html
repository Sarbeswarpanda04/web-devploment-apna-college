<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            width:350px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            font-size:18px;
            border:2px solid #ddd;
            border-radius:8px;
            outline:none;
            margin-bottom:15px;
        }

        input:focus{
            border-color:#4facfe;
        }

        button{
            width:100%;
            padding:12px;
            font-size:18px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d8cf8;
        }

        .message{
            margin-top:20px;
            font-size:18px;
            color:#444;
            font-weight:bold;
        }

        .score{
            margin-top:15px;
            color:#777;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎯 Guess the Number</h1>

        <p>Guess a number between <strong>1</strong> and <strong>100</strong>.</p>

        <input
            type="number"
            placeholder="Enter your guess"
        >

        <button>Guess</button>

        <div class="message">
            Your result will appear here...
        </div>

        <div class="score">
            Attempts: 0
        </div>
    </div>
    <script src="guess.js"></script>
</body>
</html>
