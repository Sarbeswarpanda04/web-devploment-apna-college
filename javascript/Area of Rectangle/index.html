<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area of Rectangle</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#dbeafe,#f8fafc);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:1000px;
    background:#fff;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    display:flex;
    overflow:hidden;
}

.left{
    width:35%;
    padding:35px;
    background:#eff6ff;
}


.left h1{
    color:#2563eb;
    margin-bottom:25px;
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-size:18px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:2px solid #3b82f6;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#1d4ed8;
    box-shadow:0 0 8px rgba(37,99,235,.3);
}

button{
    width:100%;
    margin-top:25px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
    text-align:center;
}

.result h2{
    color:#2563eb;
}

.result h1{
    margin-top:10px;
}


.right{
    width:65%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8fafc;
}

svg{
    width:100%;
    max-width:550px;
    aspect-ratio:1/1;
    border:2px solid #d1d5db;
    border-radius:12px;
    background:white;
}
/* ---------- Mobile Responsive ---------- */

@media (max-width:768px){

    body{
        padding:20px;
        align-items:flex-start;
    }

    .container{
        flex-direction:column;
        width:100%;
    }

    .left,
    .right{
        width:100%;
    }

    .left{
        padding:25px;
    }

    .right{
        padding:20px;
    }

    svg{
        width:80vw;
        max-width:280px;
        aspect-ratio:1/1;
    }

    .left h1{
        font-size:28px;
    }

    label{
        font-size:16px;
    }

    input{
        font-size:16px;
        padding:10px;
    }

    button{
        font-size:16px;
        padding:12px;
    }

    .result h1{
        font-size:26px;
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="left">

        <h1>▭ Area of Rectangle</h1>

        <label>Length</label>
        <input
            type="number"
            id="length"
            placeholder="Enter Length">

        <label>Width</label>
        <input
            type="number"
            id="width"
            placeholder="Enter Width">

        <button onclick="drawRectangle()">
            Calculate & Draw
        </button>

        <div class="result">

            <h2>Area</h2>

            <h1>
                <span id="area">0.00</span>
                sq. units
            </h1>

        </div>

    </div>

    <div class="right">

        <svg id="svg" width="550" height="550"></svg>

    </div>

</div>

<script src="arearectangle.js"></script>

</body>
</html>
