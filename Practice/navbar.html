<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nav Bar</title>
  <style>
    #nav{
      height: 50px;
      width: 900px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      background-color: pink;
      border : 1px solid rgb(0, 0, 114);
      border-radius: 10px;
    }
    #nav ul{
      list-style: none;
      display: flex;
    }
    #nav ul li{
      margin: 10px;

    }
    #nav ul li a{
      text-decoration: none;
      color: black;
      font-size: 20px;
      font-weight: bold;
      line-height: 50px;
      text-align: center
    }
  </style>
</head>
<body>
  <nav id="nav">
    <ul>
      <li><a href="index.html">logo</a></li></li>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <script src="prompt.js"></script>
</body>
</html>
