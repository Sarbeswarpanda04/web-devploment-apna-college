<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      display : flex;
      flex-wrap: wrap;
      justify-content: space-evenly;
      align-items: center;
      border-radius: 10px;
      background-color: white;
      border : 1px solid black;
      border-radius: 10px;
      width : 400px;
      height : 400px;
  }
    .box {
      width : 100px;
      height : 100px;
      border : 1px solid black;
      border-radius : 10px;
      background-color: rgb(100, 98, 98);
      display : flex;
      text-align : center;
      font-size: 50px;
     }

  </style>
</head>
<body>
  <div class="container">
    <div id="A" class="box">A</div>
    <div id="B" class="box">B</div>
    <div id="C" class="box">C</div>
    <div id="D" class="box">D</div>
    <div id="E" class="box">E</div>
    <div id="F" class="box">F</div>
    <div id="G" class="box">G</div>
    <div id="H" class="box">H</div>
    <div id="I" class="box">I</div>
  </div>
</body>
</html>
