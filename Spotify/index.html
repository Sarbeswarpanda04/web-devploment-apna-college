<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" href="./assets/logo.png" />
  <link rel="stylesheet" href="style.css" />
  <title>Spotify - Web Player: Music for everyone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="main">
    <div class="sidebar">
      <div class="nav">
        <div class="nav-option" style="opacity: 1">
          <i class="fa-solid fa-house"></i>
          <a href="#">Home</a>
        </div>
        <div class="nav-option">
          <i class="fa-solid fa-magnifying-glass"></i>
          <a href="#">Search</a>
        </div>
      </div>
      <div class="library">
        <div class="options">
          <div class="lib-option nav-option">
            <img src="./assets/library-icon.png" alt="" />
            <a href="#">Your Library</a>
          </div>
          <div class="icons">
            <i class="fa-solid fa-plus"></i>
            <i class="fa-solid fa-arrow-right"></i>
          </div>
        </div>
        <div class="lib-boxes"></div>
        <div class="box">
          <p class="box-p1">Create your first playlist</p>
          <p class="box-p2">It's easy will help you</p>
          <button class="badge">Create Playlist</button>
        </div>

        <div class="box">
          <p class="box-p1">Let's find some podcast to follow</p>
          <p class="box-p2">we w'll keep updating on new episodes</p>
          <button class="badge">Browse Podcasts</button>
        </div>
      </div>
    </div>
    <div class="main-content">
      <div class="sticky-nav">
        <div class="sticky-nav-icons">
          <img src="assets/backward_icon.png" alt="backward icon" />
          <img src="assets/forward_icon.png" alt="forward icon" />
        </div>
        <div class="sticky-nav-options">
          <button class="badge nav-iteam">Explore Premium</button>
          <button class="badge nav-iteam dark-badge">
            <i class="fa-regular fa-circle-down" style="color: rgb(255, 255, 255)"></i> Install apps
          </button>
          <i class="fa-regular fa-user" style="color: rgb(255, 255, 255)"></i>
        </div>
      </div>
      <div class="cards"></div>
    </div>
    <div class="music-player">Music Player</div>
  </div>
</body>

</html>
